---
# tasks file for pxe_boot
- name: ensure cobbler will pxe boot the host
  cobbler_system:
    host: "{{ domain_services.cobbler.server }}"
    username: "{{ domain_services.cobbler.user }}"
    password: "{{ domain_services.cobbler.password }}"
    name: "{{ inventory_hostname }}"
    use_ssl: yes
    properties:
      netboot_enabled: "{{ pxe_boot_netboot }}"
      status: production
      hostname: "{{ inventory_hostname }}"
      image: dummy
    interfaces:
      primary:
        macaddress: "{{ mac_address }}"
        dhcptag: "default"
  delegate_to: localhost
  notify: cobbler sync
  tags:
    - pxe_boot
