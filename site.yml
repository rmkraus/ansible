#!/usr/bin/ansible-playbook
---

- name: login to LastPass
  hosts: all
  gather_facts: no
  become: no

  vars_prompt:
  - name: "lastpass_username"
    prompt: "LastPass Username"
    private: no
  - name: "lastpass_password"
    prompt: "LastPass Master Password"
    private: yes

  roles:
    - lastpass

- name: get host information from switch
  hosts: all:!macs:!networking
  gather_facts: no

  roles:
    - role: unifi
      unifi_action: login
      unifi_server: "{{ domain_services.unifi }}"
      unifi_user: "{{ lookup('lastpass', 'Ansible Service Account', field='username') }}"
      unifi_pass: "{{ lookup('lastpass', 'Ansible Service Account', field='password') }}"
      tags:
        - dns_records
        - dns
        - dhcp

    - role: unifi
      unifi_action: logout
      unifi_server: "{{ domain_services.unifi }}"
      tags:
        - dns_records
        - dns
        - dhcp

- name: basic configuration to appliances
  hosts: appliances
  become: yes
  become_user: root

  roles:
    - root-user
    - rhsm

- name: core configuration to all hosts
  hosts: all:!macs:!networking:!appliances
  become: yes
  become_user: root

  roles:
    - rhsm
    - role: dns_records
      dns_records_host: "{{ domain_services.freeipa }}"
      dns_records_user: "{{ lookup('lastpass', 'Ansible Service Account', field='username') }}"
      dns_records_password: "{{ lookup('lastpass', 'Ansible Service Account', field='password') }}"
    - ansible-deps
    - root-user
    - ntp
    - hardening
    - monitoring
    - filesystem
    - postfix
    - role: ipa-client
      ipa_client_principal: "{{ lookup('lastpass', 'Ansible Service Account', field='username') }}"
      ipa_client_pass: "{{ lookup('lastpass', 'Ansible Service Account', field='password') }}"
    - ssh

- name: pxe boot/dhcp server
  hosts: pxe_server
  become: yes
  become_user: root
  gather_facts: no

  roles:
    - disks
    - epel
    - cobbler

- name: production infra nodes
  hosts: infra
  become: yes
  become_user: root
  gather_facts: no

  roles:
    - bind
    - vip

- name: static docker hosts
  hosts: docker
  become: yes
  become_user: root
  gather_facts: no

  roles:
    - docker

- name: configure Red Hat IdM servers
  hosts: rhidm
  become: yes
  become_user: root
  gather_facts: no

  roles:
    - ipa-server

- name: rhhi hosts
  hosts: hosts
  become: yes
  become_user: root
  gather_facts: no

  roles:
    - disks

- name: ansible tower servers
  hosts: rh_tower
  become: yes
  become_user: root
  gather_facts: no

  roles:
    - disks
    - tower
    - epel
    - lastpass-cli
...
