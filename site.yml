#!/usr/bin/ansible-playbook
---

- name: connect to secret stores
  import_playbook: load_secrets.yml

- name: get host information from switch
  hosts: all:!macs:!networking
  gather_facts: no

  roles:
    - role: unifi
      unifi_action: login
      unifi_server: "{{ domain_services.unifi }}"
      unifi_user: "{{ secrets.ansible_account }}"
      unifi_pass: "{{ secrets.ansible_password }}"
      tags:
        - dns_records
        - dns
        - dhcp

    - role: unifi
      unifi_action: logout
      unifi_server: "{{ domain_services.unifi }}"
      tags:
        - dns_records
        - dns
        - dhcp

- name: basic configuration to appliances
  hosts: tag_appliances
  become: yes
  become_user: root

  roles:
    - root-user
    - rhsm

- name: core configuration to all hosts
  hosts: all:!macs:!networking:!tag_appliances
  become: yes
  become_user: root

  roles:
    - rhsm
    - role: dns_records
      dns_records_host: "{{ domain_services.freeipa }}"
      dns_records_user: "{{ secrets.ansible_account }}"
      dns_records_password: "{{ secrets.ansible_password }}"
    - ansible-deps
    - root-user
    - ntp
    - hardening
    - monitoring
    - filesystem
    - postfix
    - role: ipa-client
      ipa_client_principal: "{{ secrets.ansible_account }}"
      ipa_client_pass: "{{ secrets.ansible_password }}"
    - ssh

- name: pxe boot/dhcp server
  hosts: pxe_server
  become: yes
  become_user: root
  gather_facts: no

  roles:
    - disks
    - epel
    - cobbler

- name: production infra nodes
  hosts: infra
  become: yes
  become_user: root
  gather_facts: no

  roles:
    - bind
    - vip

- name: static docker hosts
  hosts: docker
  become: yes
  become_user: root
  gather_facts: no

  roles:
    - docker

- name: configure Red Hat IdM servers
  hosts: rhidm
  become: yes
  become_user: root
  gather_facts: no

  roles:
    - ipa-server

- name: rhhi hosts
  hosts: hosts
  become: yes
  become_user: root
  gather_facts: no

  roles:
    - disks

- name: ansible tower servers
  hosts: rh_tower
  become: yes
  become_user: root
  gather_facts: no

  roles:
    - disks
    - tower
    - epel
    - lastpass-cli
...
