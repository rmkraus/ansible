#!/usr/bin/ansible-playbook
---
- name: join server to the network
  hosts: all
  gather_facts: no

  vars_prompt:
  - name: "lastpass_username"
    prompt: "LastPass Username"
    private: no
  - name: "lastpass_password"
    prompt: "LastPass Master Password"
    private: yes

  roles:
    - role: lastpass

    - role: unifi
      unifi_action: login
      unifi_server: "{{ domain_services.unifi.server }}"
      unifi_user: "{{ domain_services.unifi.user }}"
      unifi_pass: "{{ domain_services.unifi.password }}"
      tags:
        - dhcp
        - dns

    - role: unifi
      unifi_action: set_static_ip
      unifi_server: "{{ domain_services.unifi.server }}"
      tags:
        - dhcp

    - role: unifi
      unifi_action: set_hostname
      unifi_server: "{{ domain_services.unifi.server }}"
      tags:
        - dhcp

    - role: unifi
      unifi_action: set_usergroup
      unifi_server: "{{ domain_services.unifi.server }}"
      tags:
        - dhcp

    - role: unifi
      unifi_action: logout
      unifi_server: "{{ domain_services.unifi.server }}"
      tags:
        - dhcp
        - dns

    - role: dns_records
      dns_records_host: "{{ domain_services.freeipa }}"
      dns_records_user: "{{ lookup('lastpass', 'Ansible Service Account', field='username') }}"
      dns_records_password: "{{ lookup('lastpass', 'Ansible Service Account', field='password') }}"
      dns_records_set_local: no
      tags:
        - dns

    - role: pxe_boot
      pxe_boot_action: update
      pxe_boot_netboot: yes
      pxe_boot_server: "{{ domain_services.cobbler }}"
      pxe_boot_user: "{{ lookup('lastpass', 'Ansible Service Account', field='username') }}"
      pxe_boot_password: "{{ lookup('lastpass', 'Ansible Service Account', field='password') }}"
      tags:
        - pxe
