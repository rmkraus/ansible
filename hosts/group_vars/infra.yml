bind_forwarders: '1.1.1.1;1.0.0.1;'
bind_master: inf-0
bind_zones:
  - name: lab.rmkra.us.
    type: slave
    masters: 192.168.4.15;
  - name: mgmt.rmkra.us.
    type: forward
    masters: 192.168.4.1;
  - name: nas.rmkra.us.
    type: forward
    masters: 192.168.4.1;
  - name: 5.168.192.in-addr.arpa.
    type: forward
    masters: 192.168.4.1;
  - name: 4.168.192.in-addr.arpa.
    type: slave
    masters: 192.168.4.15;
  - name: 3.168.192.in-addr.arpa.
    type: forward
    masters: 192.168.4.1;
  - name: home.rmkra.us.
    type: forward
    masters: 192.168.4.1;
  - name: 1.168.192.in-addr.arpa.
    type: forward
    masters: 192.168.4.1;

postfix_mynetworks: 192.168.0.0/16
postfix_myorigin: rmkra.us
postfix_inet_interfaces: all
postfix_relayhost: "[{{ lookup('lastpass', 'Mailjet', field='server') }}]:587"
postfix_smtp_sasl_auth_enable: yes
postfix_sasl_entries:
  - server: "{{ lookup('lastpass', 'Mailjet', field='server') }}"
    auth: "{{ lookup('lastpass', 'Mailjet', field='auth') }}"

vip_router_id_prefix: 10
vip_configs:
  - interface: eth0
    master: inf-0
    vips:
      - 192.168.4.5
    password: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          34353063613466303162656665633834323935396435616166653634353737343565346464646262
          6133653134653838393938623966653661663465643330310a396165323839643364656538616339
          31376437326261656366646562646361393461386238366435303131303762323637306635386566
          3732636137336166640a666162613731383334343038343339656433336464643636646439663463
          3666

dns_records_custom_records:
  - name: inf-vip
    type: A
    value: 192.168.4.5
    zone: lab.rmkra.us
